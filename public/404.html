<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    rel="stylesheet"
  />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: #FAF9F6;
      color: #1B1B1B;
      display: flex;
      align-items: center;

      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      border-radius: 9999px;

      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(52,78,65,0.3);
    }
    a:hover {
      transform: scale(1.05);
